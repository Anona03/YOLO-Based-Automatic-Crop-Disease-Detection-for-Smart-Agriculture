# PlantVillage YOLO Dataset Configuration
# Dataset path: https://www.kaggle.com/datasets/emmarex/plantdisease (example)

# Dataset directories

train: Dataset/images/train  # 训练集图像路径 (相对path)
val: Dataset/images/val      # 验证集图像路径 (相对path)

# Number of classes
nc: 10  # PlantVillage有38个类别

# Class names (按字母顺序排列的完整PlantVillage类别)
names:
  0: Apple___Apple_scab
  1: Apple___Black_rot
  2: Apple___Cedar_apple_rust
  3: Apple___healthy
  4: Blueberry___healthy
  5: Cherry_(including_sour)___Powdery_mildew
  6: Cherry_(including_sour)___healthy
  7: Corn_(maize)___Cercospora_leaf_spot Gray_leaf_spot
  8: Corn_(maize)___Common_rust_
  9: Corn_(maize)___Northern_Leaf_Blight



